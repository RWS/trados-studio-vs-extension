name: .NET Core Desktop

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  StudioProductIdentifier: 19

jobs:

  build:
    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: TemplatesVSIX/TemplatesVSIX.sln                     # Replace with your solution name, i.e. MyWpfApp.sln.      

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
        source-url: ${{ vars.SDL_NUGET }}
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.AZURE_ARTIFACT_PAT }} 

    - name: Download an artifact from an Azure Pipeline
      shell: pwsh
      env:
        AZURE_DEVOPS_PAT: ${{ secrets.AZURE_ARTIFACT_PAT }}
      run: |
        $ErrorActionPreference = "Stop"

        try {
          $org          = "sdl"
          $project      = "TradosStudio"
          $definitionId = 1258
          $artifactName = "binaries"
          $targetPath   = "$env:ProgramFiles\Trados\Trados Studio\Studio$env:StudioProductIdentifier"
          $zipPath      = "$env:TEMP\artifact-$artifactName.zip"

          if ([string]::IsNullOrWhiteSpace($env:AZURE_DEVOPS_PAT)) {
            throw "AZURE_DEVOPS_PAT is missing. Ensure the AZURE_ARTIFACT_PAT secret is configured."
          }

          $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$env:AZURE_DEVOPS_PAT"))
          $headers    = @{ Authorization = "Basic $base64Auth" }

          # Get the latest successful build for this pipeline definition
          $buildsUrl = "https://dev.azure.com/$org/$project/_apis/build/builds?definitions=$definitionId&resultFilter=succeeded&`$top=1&api-version=7.1"
          $builds    = Invoke-RestMethod -Uri $buildsUrl -Headers $headers

          if (-not $builds.value -or $builds.count -lt 1) {
            throw "No successful builds found for definition id $definitionId in $org/$project."
          }

          $buildId = $builds.value[0].id
          if (-not $buildId) {
            throw "Build lookup succeeded but no build id was returned."
          }
          Write-Host "Using build $buildId"

          # Download the artifact as a zip
          $artifactUrl = "https://dev.azure.com/$org/$project/_apis/build/builds/$buildId/artifacts?artifactName=$artifactName&api-version=7.1&`$format=zip"
          Invoke-WebRequest -Uri $artifactUrl -Headers $headers -OutFile $zipPath

          if (-not (Test-Path -Path $zipPath)) {
            throw "Artifact download failed: zip file was not created at $zipPath."
          }

          # Extract into the target path
          New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $targetPath -Force
          Write-Host "Artifact extracted to $targetPath"
        }
        catch {
          Write-Host "::error::Artifact download/extract failed. $($_.Exception.Message)"
          throw
        }

    
    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2
      

    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=Release

    - name: build the application
      run: msbuild $env:Solution_Name /t:Build /p:Configuration=Release



