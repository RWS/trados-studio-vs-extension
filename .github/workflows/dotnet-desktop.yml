name: .NET Core Desktop

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  StudioProductIdentifier: 19

jobs:

  build:
    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: TemplatesVSIX/TemplatesVSIX.sln                     # Replace with your solution name, i.e. MyWpfApp.sln.      

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
        source-url: ${{ vars.SDL_NUGET }}
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.AZURE_ARTIFACT_PAT }} 

    - name: Download an artifact from an Azure Pipeline
      shell: pwsh
      env:
        AZURE_DEVOPS_PAT: ${{ secrets.AZURE_ARTIFACT_PAT }}
      run: |
        $ErrorActionPreference = "Stop"

        try {
          Write-Host "[debug] Starting Azure artifact download step"
          $org          = "sdl"
          $project      = "TradosStudio"
          $definitionId = 1258
          $artifactName = "binaries"
          $targetPath   = "$env:ProgramFiles\Trados\Trados Studio\Studio$env:StudioProductIdentifier"
          $zipPath      = "$env:TEMP\artifact-$artifactName.zip"
          Write-Host "[debug] Organization: $org | Project: $project | DefinitionId: $definitionId | Artifact: $artifactName"
          Write-Host "[debug] Target path: $targetPath"
          Write-Host "[debug] Zip path: $zipPath"

          if ([string]::IsNullOrWhiteSpace($env:AZURE_DEVOPS_PAT)) {
            throw "AZURE_DEVOPS_PAT is missing. Ensure the AZURE_ARTIFACT_PAT secret is configured."
          }
          Write-Host "[debug] PAT secret is present"

          $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$env:AZURE_DEVOPS_PAT"))
          $headers    = @{ Authorization = "Basic $base64Auth" }

          # Get the latest successful build for this pipeline definition
          $buildsUrl = "https://dev.azure.com/$org/$project/_apis/build/builds?definitions=$definitionId&resultFilter=succeeded&`$top=1&api-version=7.1"
          Write-Host "[debug] Requesting builds from: $buildsUrl"
          $builds    = Invoke-RestMethod -Uri $buildsUrl -Headers $headers
          Write-Host "[debug] Builds API returned count: $($builds.count)"

          if (-not $builds.value -or $builds.count -lt 1) {
            throw "No successful builds found for definition id $definitionId in $org/$project."
          }

          $buildId = $builds.value[0].id
          if (-not $buildId) {
            throw "Build lookup succeeded but no build id was returned."
          }
          Write-Host "Using build $buildId"

          # Resolve artifact metadata first, then use its download URL
          $artifactMetaUrl = "https://dev.azure.com/$org/$project/_apis/build/builds/$buildId/artifacts?artifactName=$artifactName&api-version=7.1"
          Write-Host "[debug] Requesting artifact metadata from: $artifactMetaUrl"
          $artifactMeta    = Invoke-RestMethod -Uri $artifactMetaUrl -Headers $headers
          $downloadUrl     = $artifactMeta.resource.downloadUrl
          Write-Host "[debug] Artifact metadata resolved"

          if ([string]::IsNullOrWhiteSpace($downloadUrl)) {
            throw "Artifact metadata did not include resource.downloadUrl for '$artifactName'."
          }
          Write-Host "[debug] Download URL was returned"

          if (Test-Path -Path $zipPath) {
            Write-Host "[debug] Existing zip found, removing: $zipPath"
            Remove-Item -Path $zipPath -Force
          }

          Write-Host "[debug] Downloading artifact zip"
          Invoke-WebRequest -Uri $downloadUrl -Headers $headers -OutFile $zipPath
          Write-Host "[debug] Download request completed"

          if (-not (Test-Path -Path $zipPath)) {
            throw "Artifact download failed: zip file was not created at $zipPath."
          }
          if ((Get-Item -Path $zipPath).Length -le 0) {
            throw "Artifact download failed: zip file is empty at $zipPath."
          }
          Write-Host "[debug] Zip size (bytes): $((Get-Item -Path $zipPath).Length)"

          # Extract into the target path
          Write-Host "[debug] Creating target directory"
          New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
          Write-Host "[debug] Extracting zip archive"
          Expand-Archive -Path $zipPath -DestinationPath $targetPath -Force
          Write-Host "Artifact extracted to $targetPath"
          Write-Host "[debug] Artifact step completed successfully"
        }
        catch {
          Write-Host "::error::Artifact download/extract failed."
          Write-Host "::error::Message: $($_.Exception.Message)"
          Write-Host "::error::Type: $($_.Exception.GetType().FullName)"
          Write-Host "::error::ScriptStackTrace: $($_.ScriptStackTrace)"
          throw
        }

    
    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2
      

    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=Release

    - name: build the application
      run: msbuild $env:Solution_Name /t:Build /p:Configuration=Release



